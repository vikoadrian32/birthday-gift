<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎂 Birthday Player</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <canvas id="bgCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
    <script>
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', () => { resize(); initFlowers(); });

      const COLORS = [
        { r:212,g:160,b:23 }, { r:139,g:37,b:37 },
        { r:107,g:26,b:26 },  { r:180,g:100,b:20 },
        { r:220,g:170,b:50 }, { r:74,g:14,b:14 },
      ];

      function drawFlower(cx,cy,r,petals,color,alpha,rot) {
        ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot); ctx.globalAlpha = alpha;
        for(let i=0;i<petals;i++){
          const angle=(i/petals)*Math.PI*2;
          ctx.save(); ctx.rotate(angle);
          ctx.beginPath();
          ctx.ellipse(0,-r*0.7,r*0.3,r*0.65,0,0,Math.PI*2);
          ctx.fillStyle=`rgb(${color.r},${color.g},${color.b})`;
          ctx.fill(); ctx.restore();
        }
        ctx.beginPath(); ctx.arc(0,0,r*0.28,0,Math.PI*2);
        ctx.fillStyle=`rgb(${Math.min(color.r+60,255)},${Math.min(color.g+50,255)},${Math.min(color.b+30,255)})`;
        ctx.fill(); ctx.restore();
      }

      function drawRose(cx,cy,r,color,alpha,rot) {
        ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot); ctx.globalAlpha=alpha;
        for(let i=0;i<5;i++){
          const angle=(i/5)*Math.PI*2;
          ctx.save(); ctx.rotate(angle);
          ctx.beginPath();
          ctx.ellipse(0,-r*0.55,r*0.38,r*0.55,0,0,Math.PI*2);
          ctx.fillStyle=`rgba(${color.r},${color.g},${color.b},0.9)`;
          ctx.fill(); ctx.restore();
        }
        for(let i=0;i<3;i++){
          const angle=(i/3)*Math.PI*2+0.3;
          ctx.save(); ctx.rotate(angle);
          ctx.beginPath();
          ctx.ellipse(0,-r*0.3,r*0.28,r*0.38,0,0,Math.PI*2);
          ctx.fillStyle=`rgba(${Math.min(color.r+30,255)},${color.g},${color.b},0.95)`;
          ctx.fill(); ctx.restore();
        }
        ctx.beginPath(); ctx.arc(0,0,r*0.2,0,Math.PI*2);
        ctx.fillStyle=`rgb(${Math.min(color.r+80,255)},${Math.min(color.g+60,255)},${color.b})`;
        ctx.fill(); ctx.restore();
      }

      const flowers = [];
      function initFlowers() {
        flowers.length=0;
        for(let i=0;i<35;i++){
          const isRose=Math.random()>0.5;
          const y=Math.random()*canvas.height;
          flowers.push({
            x:Math.random()*canvas.width, baseY:y, y,
            r:12+Math.random()*32,
            petals:isRose?5:(4+Math.floor(Math.random()*4)),
            color:COLORS[Math.floor(Math.random()*COLORS.length)],
            alpha:0.08+Math.random()*0.2,
            rot:Math.random()*Math.PI*2,
            rotSpeed:(Math.random()-0.5)*0.004,
            floatY:Math.random()*Math.PI*2,
            floatSpeed:0.003+Math.random()*0.007,
            floatAmp:8+Math.random()*18,
            isRose,
          });
        }
      }
      initFlowers();

      function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        flowers.forEach(f=>{
          f.rot+=f.rotSpeed;
          f.floatY+=f.floatSpeed;
          const y=f.baseY+Math.sin(f.floatY)*f.floatAmp;
          if(f.isRose) drawRose(f.x,y,f.r,f.color,f.alpha,f.rot);
          else drawFlower(f.x,y,f.r,f.petals,f.color,f.alpha,f.rot);
        });
        requestAnimationFrame(draw);
      }
      draw();
      </script>
  </body>
</html>
